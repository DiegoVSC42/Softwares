name: Build Normalizador de Numeros

on:
  push:
    paths:
      - "normalizador-numeros/**"
      - ".github/workflows/normalizador-numeros-build.yml"
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: normalizador-numeros
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build Windows
        run: >
          pyinstaller --onefile --windowed
          --name "NormalizadorNumeros"
          normalizador_numeros.py
      - uses: actions/upload-artifact@v4
        with:
          name: normalizador-numeros-windows
          path: normalizador-numeros/dist/NormalizadorNumeros.exe

  mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: normalizador-numeros
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build Mac
        run: >
          pyinstaller --onefile --windowed
          --name "NormalizadorNumeros"
          normalizador_numeros.py
      - name: Compactar o .app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent NormalizadorNumeros.app NormalizadorNumeros-mac.zip
      - uses: actions/upload-artifact@v4
        with:
          name: normalizador-numeros-mac
          path: normalizador-numeros/dist/NormalizadorNumeros-mac.zip

  release:
    needs: [windows, mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artefatos
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: normalizador-numeros
          name: Normalizador de Numeros
          files: |
            artefatos/**/*.exe
            artefatos/**/*.zip
