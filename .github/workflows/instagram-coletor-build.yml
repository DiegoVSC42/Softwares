name: Build Instagram Coletor

on:
  push:
    paths:
      - "instagram-coletor/**"
      - ".github/workflows/instagram-coletor-build.yml"
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: instagram-coletor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build Windows
        run: >
          pyinstaller --onefile --windowed
          --name "InstagramColetor"
          --collect-all gallery_dl
          instagram_coletor.py
      - uses: actions/upload-artifact@v4
        with:
          name: instagram-coletor-windows
          path: instagram-coletor/dist/InstagramColetor.exe

  mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: instagram-coletor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build Mac
        run: >
          pyinstaller --onefile --windowed
          --name "InstagramColetor"
          --collect-all gallery_dl
          instagram_coletor.py
      - name: Compactar o .app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent InstagramColetor.app InstagramColetor-mac.zip
      - uses: actions/upload-artifact@v4
        with:
          name: instagram-coletor-mac
          path: instagram-coletor/dist/InstagramColetor-mac.zip

  release:
    needs: [windows, mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artefatos
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: instagram-coletor
          name: Instagram Coletor
          files: |
            artefatos/**/*.exe
            artefatos/**/*.zip
