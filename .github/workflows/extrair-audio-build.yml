name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

defaults:
  run:
    working-directory: extrair-audio

jobs:
  # ----------------------------------------------------------------------
  # Windows: gera o .exe com ffmpeg embutido
  # ----------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Baixar ffmpeg (Windows)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName -Destination ffmpeg.exe

      - name: Empacotar com PyInstaller
        run: pyinstaller --onefile --windowed --name ExtrairAudio --add-binary "ffmpeg.exe;." extrair_audio.py

      - uses: actions/upload-artifact@v4
        with:
          name: ExtrairAudio-Windows
          path: extrair-audio/dist/ExtrairAudio.exe

  # ----------------------------------------------------------------------
  # Mac: gera o .app, ffmpeg embutido, e compacta em .zip com ditto
  # ----------------------------------------------------------------------
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Baixar ffmpeg (Mac)
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg.zip
          unzip -o ffmpeg.zip
          chmod +x ffmpeg

      - name: Empacotar com PyInstaller
        run: pyinstaller --onefile --windowed --name ExtrairAudio --add-binary "ffmpeg:." extrair_audio.py

      - name: Compactar .app com ditto
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent ExtrairAudio.app ExtrairAudio-mac.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ExtrairAudio-Mac
          path: extrair-audio/dist/ExtrairAudio-mac.zip

  # ----------------------------------------------------------------------
  # Release: publica o .exe (Windows) e o .zip (Mac) no GitHub, com link
  # de download fixo em: releases/download/extrair-audio/<arquivo>
  # ----------------------------------------------------------------------
  release:
    needs: [ windows, mac ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Baixar artefatos (exe e zip)
        uses: actions/download-artifact@v4
        with:
          path: artefatos

      - name: Publicar exe e zip no Release do GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: extrair-audio
          name: "Extrair Audio"
          files: |
            artefatos/**/*.exe
            artefatos/**/*.zip
