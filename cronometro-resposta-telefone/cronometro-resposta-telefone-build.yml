name: Build cronometro-resposta-telefone

on:
  push:
    paths:
      - 'cronometro-resposta-telefone/**'
      - '.github/workflows/cronometro-resposta-telefone-build.yml'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: cronometro-resposta-telefone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name CronometroResposta cronometro_resposta_telefone.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: cronometro-resposta-telefone/dist/CronometroResposta.exe

  mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: cronometro-resposta-telefone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name CronometroResposta cronometro_resposta_telefone.py
      - run: ditto -c -k --sequesterRsrc --keepParent dist/CronometroResposta.app CronometroResposta-mac.zip
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: cronometro-resposta-telefone/CronometroResposta-mac.zip

  # ----------------------------------------------------------------------
  # Release: publica o .exe (Windows) e o .zip (Mac) no GitHub, com link
  # de download fixo em: releases/download/cronometro-resposta-telefone/<arquivo>
  # ----------------------------------------------------------------------
  release:
    needs: [ windows, mac ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Baixar artefatos (exe e zip)
        uses: actions/download-artifact@v4
        with:
          path: artefatos

      - name: Publicar exe e zip no Release do GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cronometro-resposta-telefone
          name: "Cronometro Resposta Telefone"
          files: |
            artefatos/**/*.exe
            artefatos/**/*.zip
